name: release

# On a vX.Y.Z tag: build all platform binaries in a clean runner and publish a
# GitHub Release with binaries + SHA256SUMS. This mirrors adtention-claude.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Tag must match plugin.json version
        run: |
          PLUGIN_V="v$(grep '"version"' plugins/adtention-codex/.codex-plugin/plugin.json | head -1 \
            | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')"
          if [ "$PLUGIN_V" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match plugin.json version $PLUGIN_V"
            exit 1
          fi

      - name: Build
        run: ./build.sh

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "Release build from this tag. Verify a download with:
          \`shasum -a 256 -c SHA256SUMS\`" \
            plugins/adtention-codex/bin/adtention-codex-darwin-amd64 \
            plugins/adtention-codex/bin/adtention-codex-darwin-arm64 \
            plugins/adtention-codex/bin/adtention-codex-linux-amd64 \
            plugins/adtention-codex/bin/adtention-codex-linux-arm64 \
            plugins/adtention-codex/bin/adtention-codex-windows-amd64.exe \
            plugins/adtention-codex/bin/SHA256SUMS
